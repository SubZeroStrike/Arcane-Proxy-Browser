<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcane Browser</title>
    <style>
      :root {
        --bg: #0a0a0f;
        --accent: #7b5eff;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: var(--bg);
        color: #e0e0ff;
        display: flex;
        flex-direction: column;
      }

      .toolbar {
        background: rgba(15, 15, 25, 0.95);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(123, 94, 255, 0.2);
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }

      .nav-buttons {
        display: flex;
        gap: 6px;
      }
      .nav-buttons button {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: white;
        width: 42px;
        height: 42px;
        border-radius: 12px;
        font-size: 18px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .nav-buttons button:hover:not(:disabled) {
        background: rgba(123, 94, 255, 0.25);
      }
      .nav-buttons button:disabled {
        opacity: 0.35;
        cursor: default;
      }

      .address-bar {
        flex: 1;
        background: rgba(30, 30, 45, 0.8);
        border: 2px solid rgba(123, 94, 255, 0.3);
        border-radius: 9999px;
        padding: 4px;
        transition: border-color 0.2s;
      }
      .address-bar:focus-within {
        border-color: rgba(123, 94, 255, 0.7);
      }

      .address-bar input {
        width: 100%;
        background: transparent;
        border: none;
        color: white;
        font-size: 15px;
        padding: 10px 20px;
        outline: none;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 9999px;
        font-size: 13px;
        white-space: nowrap;
      }

      .dot {
        width: 9px;
        height: 9px;
        background: #4ade80;
        border-radius: 50%;
        animation: pulse 2s infinite;
        flex-shrink: 0;
      }
      .dot.loading {
        background: #facc15;
      }
      .dot.error {
        background: #f87171;
        animation: none;
      }
      @keyframes pulse {
        50% {
          opacity: 0.45;
        }
      }

      .viewport {
        flex: 1;
        position: relative;
        background: #fff;
        overflow: hidden;
        min-height: 0;
      }

      #proxyFrame {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        z-index: 50;
        transition: opacity 0.3s;
      }
      .overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .spinner {
        width: 56px;
        height: 56px;
        border: 5px solid rgba(123, 94, 255, 0.2);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.85s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .welcome-title {
        font-size: 54px;
        background: linear-gradient(90deg, #c4b5fd, #7b5eff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 700;
        letter-spacing: -1px;
      }
      .welcome-sub {
        margin-top: 12px;
        color: rgba(255, 255, 255, 0.35);
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <div class="nav-buttons">
        <button onclick="goBack()" id="backBtn" disabled title="Back">←</button>
        <button onclick="goForward()" id="forwardBtn" disabled title="Forward">
          →
        </button>
        <button onclick="reload()" title="Reload">⟳</button>
      </div>

      <div class="address-bar">
        <input
          type="text"
          id="urlInput"
          placeholder="Search or enter address"
          onkeypress="if(event.key==='Enter') navigate()"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <div class="status">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Ready</span>
      </div>
    </div>

    <div class="viewport">
      <div class="overlay" id="welcomeScreen">
        <div class="welcome-title">Arcane</div>
        <div class="welcome-sub">Enter an address above to start browsing</div>
      </div>

      <div class="overlay hidden" id="loaderScreen">
        <div class="spinner"></div>
        <p
          style="margin-top: 22px; color: #aaa; font-size: 14px"
          id="loaderText"
        >
          Loading…
        </p>
      </div>

      <!--
        sandbox allows scripts, same-origin (needed for proxy page to run),
        forms, popups and downloads so game iframes/modals work.
        allow-top-navigation-by-user-activation lets clicked links update the frame src.
    -->
      <iframe
        id="proxyFrame"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-pointer-lock allow-top-navigation-by-user-activation"
        allow="fullscreen; clipboard-write; autoplay"
      >
      </iframe>
    </div>

    <script>
      // ── State ────────────────────────────────────────────────────────────────
      let sessionKey = null;
      let sessionId = null;
      let navHistory = [];
      let historyIdx = -1;
      let loading = false;

      const frame = document.getElementById("proxyFrame");
      const urlInput = document.getElementById("urlInput");
      const statusDot = document.getElementById("statusDot");
      const statusText = document.getElementById("statusText");
      const welcomeEl = document.getElementById("welcomeScreen");
      const loaderEl = document.getElementById("loaderScreen");
      const loaderText = document.getElementById("loaderText");
      const backBtn = document.getElementById("backBtn");
      const forwardBtn = document.getElementById("forwardBtn");

      // ── Session init ─────────────────────────────────────────────────────────
      async function initSession() {
        try {
          const res = await fetch("/health");
          const data = await res.json();
          sessionId = res.headers.get("x-session-id");
          sessionKey = Uint8Array.from(atob(data.sessionKey), (c) =>
            c.charCodeAt(0)
          );
          setStatus("ready", "Ready");
        } catch (e) {
          setStatus("error", "Server error");
        }
      }

      // ── XOR encrypt (mirrors server-side) ───────────────────────────────────
      function encryptUrl(url) {
        const data = new TextEncoder().encode(url);
        const enc = new Uint8Array(data.length);
        for (let i = 0; i < data.length; i++)
          enc[i] = data[i] ^ sessionKey[i % 32];
        return encodeURIComponent(btoa(String.fromCharCode(...enc)));
      }

      // ── Navigation ───────────────────────────────────────────────────────────
      async function loadUrl(rawUrl) {
        if (!sessionKey) {
          alert("Session not ready, please wait.");
          return;
        }
        if (loading) return;
        loading = true;

        // Normalise
        if (!rawUrl.startsWith("http://") && !rawUrl.startsWith("https://")) {
          rawUrl = "https://" + rawUrl;
        }

        urlInput.value = rawUrl;
        setStatus("loading", "Loading…");
        welcomeEl.classList.add("hidden");
        loaderEl.classList.remove("hidden");
        loaderText.textContent =
          "Connecting to " + new URL(rawUrl).hostname + "…";

        // Push to history
        if (navHistory[historyIdx] !== rawUrl) {
          navHistory = navHistory.slice(0, historyIdx + 1);
          navHistory.push(rawUrl);
          historyIdx = navHistory.length - 1;
        }
        updateNavButtons();

        const encrypted = encryptUrl(rawUrl);
        frame.src = `/api/proxy/page?sid=${sessionId}&url=${encrypted}`;
      }

      function navigate() {
        const val = urlInput.value.trim();
        if (!val) return;
        // If it looks like a search query rather than a URL, route to Google
        const isUrl = /^https?:\/\/|^[a-z0-9-]+\.[a-z]{2,}/i.test(val);
        loadUrl(
          isUrl ? val : "https://duckduckgo.com/?q=" + encodeURIComponent(val)
        );
      }

      function goBack() {
        if (historyIdx > 0) loadUrl(navHistory[--historyIdx]);
      }

      function goForward() {
        if (historyIdx < navHistory.length - 1)
          loadUrl(navHistory[++historyIdx]);
      }

      function reload() {
        if (frame.src && frame.src !== "about:blank") {
          const current = frame.src;
          frame.src = "about:blank";
          setTimeout(() => {
            frame.src = current;
          }, 50);
        }
      }

      function updateNavButtons() {
        backBtn.disabled = historyIdx <= 0;
        forwardBtn.disabled = historyIdx >= navHistory.length - 1;
      }

      // ── Status helpers ───────────────────────────────────────────────────────
      function setStatus(state, text) {
        statusDot.className =
          "dot" +
          (state === "loading"
            ? " loading"
            : state === "error"
            ? " error"
            : "");
        statusText.textContent = text;
      }

      // ── Frame load/error events ──────────────────────────────────────────────
      frame.addEventListener("load", () => {
        loading = false;
        loaderEl.classList.add("hidden");
        setStatus("ready", "Loaded");

        // Try to read the URL the frame ended up at (may be blocked by same-origin)
        try {
          const loc = frame.contentWindow.location.href;
          if (loc && loc !== "about:blank") {
            // Extract the original URL from the proxy URL if possible
            const u = new URL(loc);
            const rawParam = u.searchParams.get("raw");
            if (rawParam) urlInput.value = rawParam;
          }
        } catch (_) {
          /* cross-origin — fine */
        }
      });

      frame.addEventListener("error", () => {
        loading = false;
        loaderEl.classList.add("hidden");
        setStatus("error", "Failed to load");
      });

      // ── Boot ─────────────────────────────────────────────────────────────────
      initSession();
    </script>
  </body>
</html>
